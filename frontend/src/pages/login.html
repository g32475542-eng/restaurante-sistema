<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiMenu - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 1rem;
        }
        
        .login-form {
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            background: #f9f9f9;
        }
        
        .form-group input:focus {
            border-color: #667eea;
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .login-error {
            background: #fee;
            color: #e53e3e;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.95rem;
            border-left: 4px solid #e53e3e;
            animation: shake 0.3s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .login-info {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 12px;
            font-size: 0.9rem;
        }
        
        .login-info p {
            margin: 8px 0;
            color: #555;
        }
        
        .login-info strong {
            color: #667eea;
        }
        
        .login-info .admin { color: #e53e3e; }
        .login-info .garcom { color: #38a169; }
        .login-info .cozinha { color: #dd6b20; }
        
        .login-footer {
            text-align: center;
            margin-top: 25px;
            color: #999;
            font-size: 0.85rem;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
            display: none;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            .login-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🍽️ DigiMenu</h1>
            <p>Faça login para acessar o sistema</p>
        </div>
        
        <div class="login-error" id="loginError"></div>
        
        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label for="usuario">👤 Usuário</label>
                <input type="text" id="usuario" placeholder="Digite seu usuário" autocomplete="off" required>
            </div>
            
            <div class="form-group">
                <label for="senha">🔒 Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>
            
            <button type="submit" class="btn-login" id="btnLogin">
                <span class="btn-content">
                    <span class="loading-spinner" id="loadingSpinner"></span>
                    <span id="btnText">Entrar</span>
                </span>
            </button>
        </form>
        
        <div class="login-info">
            <p><strong>🔑 Credenciais de teste:</strong></p>
            <p><span class="admin">👑 Admin:</span> admin / 123456</p>
            <p><span class="garcom">👨‍🍳 Garçom:</span> joao / 123456</p>
            <p><span class="cozinha">👩‍🍳 Cozinha:</span> maria / 123456</p>
        </div>
        
        <div class="login-footer">
            <p>DigiMenu - Sistema de Gestão de Restaurantes</p>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('loginError');
        const btn = document.getElementById('btnLogin');
        const spinner = document.getElementById('loadingSpinner');
        const btnText = document.getElementById('btnText');

        form.addEventListener('submit', async function(e) {
            // IMPEDE O COMPORTAMENTO PADRÃO
            e.preventDefault();
            e.stopPropagation();
            
            const usuario = document.getElementById('usuario').value;
            const senha = document.getElementById('senha').value;

            // Validação básica
            if (!usuario || !senha) {
                mostrarErro('Preencha todos os campos!');
                return false;
            }

            // Mostrar loading
            btn.disabled = true;
            spinner.style.display = 'inline-block';
            btnText.textContent = 'Entrando...';
            errorDiv.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ usuario, senha })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.erro || 'Erro ao fazer login');
                }

                console.log('✅ Login bem sucedido:', data);
                
                // REDIRECIONAMENTO MANUAL (VERSÃO MAIS CONFIÁVEL)
                console.log('Redirecionando para:', data.tipo);
                
                setTimeout(() => {
                    if (data.tipo === 'admin') {
                        window.location.href = '/admin';
                    } else if (data.tipo === 'garcom') {
                        window.location.href = '/garcom';
                    } else if (data.tipo === 'cozinha') {
                        window.location.href = '/cozinha';
                    } else {
                        window.location.href = '/';
                    }
                }, 500); // Pequeno delay para garantir
                
            } catch (error) {
                console.error('❌ Erro no login:', error);
                mostrarErro(error.message);
                
                // Resetar botão
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = 'Entrar';
            }
            
            return false;
        });

        function mostrarErro(mensagem) {
            errorDiv.textContent = mensagem;
            errorDiv.style.display = 'block';
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
    });
    </script>
</body>
</html>
