<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Restaurante</title>
    <link rel="stylesheet" href="/css/global.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            animation: scaleIn 0.5s ease;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: var(--gray);
            font-size: 1rem;
        }
        
        .login-form .form-group {
            margin-bottom: 20px;
        }
        
        .login-form label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 600;
        }
        
        .login-form input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: var(--radius-md);
            font-size: 1rem;
            transition: var(--transition);
        }
        
        .login-form input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        
        .login-form button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }
        
        .login-form button:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .login-form button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .login-error {
            background: #ffebee;
            color: var(--danger);
            padding: 12px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: 500;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 30px;
            color: var(--gray);
            font-size: 0.9rem;
        }
        
        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        .login-info {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
        }
        
        .login-info p {
            margin: 5px 0;
            color: var(--gray);
        }
        
        .login-info strong {
            color: var(--dark);
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            
            .login-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <h1>🍽️ Restaurante</h1>
                <p>Faça login para acessar o sistema</p>
            </div>
            
            <div class="login-error" id="loginError"></div>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="usuario">Usuário</label>
                    <input type="text" id="usuario" placeholder="Digite seu usuário" autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha">
                </div>
                
                <button type="submit" id="btnLogin">
                    <span>Entrar</span>
                    <span class="loading" style="display: none;"></span>
                </button>
            </form>
            
            <div class="login-info">
                <p><strong>🔑 Credenciais de teste:</strong></p>
                <p>👨‍💼 Admin: admin / 123456</p>
                <p>👨‍🍳 Garçom: joao / 123456</p>
                <p>👩‍🍳 Cozinha: maria / 123456</p>
            </div>
            
            <div class="login-footer">
                <p>Sistema de Gestão de Restaurante v2.0</p>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usuario = document.getElementById('usuario').value;
            const senha = document.getElementById('senha').value;
            const btn = document.getElementById('btnLogin');
            const errorDiv = document.getElementById('loginError');
            
            if (!usuario || !senha) {
                errorDiv.textContent = 'Preencha todos os campos!';
                errorDiv.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            btn.querySelector('span').style.display = 'none';
            btn.querySelector('.loading').style.display = 'inline-block';
            errorDiv.style.display = 'none';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, senha })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.erro || 'Erro ao fazer login');
                }
                
                // Redirecionar baseado no tipo
                switch(data.tipo) {
                    case 'admin':
                        window.location.href = '/admin';
                        break;
                    case 'garcom':
                        window.location.href = '/garcom';
                        break;
                    case 'cozinha':
                        window.location.href = '/cozinha';
                        break;
                    default:
                        window.location.href = '/';
                }
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                
                btn.disabled = false;
                btn.querySelector('span').style.display = 'inline';
                btn.querySelector('.loading').style.display = 'none';
            }
        });
        
        // Enter no campo senha
        document.getElementById('senha').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
