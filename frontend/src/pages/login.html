<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Sistema Restaurante</title>

<link rel="stylesheet" href="/css/global.css">

</head>

<body>

<div class="login-page">

<div class="login-card">

<h1>🍽️ Restaurante</h1>
<p>Faça login</p>

<div id="loginError" style="display:none;color:red"></div>

<form id="loginForm">

<input
type="text"
id="usuario"
placeholder="Usuário"
required
/>

<input
type="password"
id="senha"
placeholder="Senha"
required
/>

<button type="submit" id="btnLogin">
Entrar
</button>

</form>

</div>

</div>

<script>

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

const usuario = document.getElementById("usuario").value.trim();
const senha = document.getElementById("senha").value.trim();
const error = document.getElementById("loginError");

error.style.display="none";

try{

const response = await fetch("/api/login",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({usuario,senha})
});

const data = await response.json();

if(!response.ok){
throw new Error(data.erro || "Erro login");
}

switch(data.tipo){

case "admin":
window.location="/admin/painel-admin.html"
break;

case "garcom":
window.location="/garcom/dashboard-garcom.html"
break;

case "cozinha":
window.location="/cozinha/tela-cozinha.html"
break;

}

}catch(err){

error.innerText = err.message;
error.style.display="block";

}

});

</script>

</body>
</html>
