<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Sistema Restaurante</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .login-container {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
      }
      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
      }
      .opcoes-acesso {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-top: 20px;
      }
      .btn-acesso {
        padding: 15px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        text-decoration: none;
        text-align: center;
      }
      .btn-acesso:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }
      .btn-garcom {
        background: #4caf50;
        color: white;
      }
      .btn-cozinha {
        background: #ff9800;
        color: white;
      }
      .btn-admin {
        background: #f44336;
        color: white;
        grid-column: span 2;
      }
      .info-sistema {
        margin-top: 30px;
        text-align: center;
        color: #666;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h1>🍽️ Sistema do Restaurante</h1>
      <p style="text-align: center; margin-bottom: 20px">Escolha seu acesso:</p>

      <div class="opcoes-acesso">
        <a href="/garcom/dashboard-garcom.html" class="btn-acesso btn-garcom"
          >👨‍🍳 Garçom</a
        >
        <a href="/cozinha/tela-cozinha.html" class="btn-acesso btn-cozinha"
          >👩‍🍳 Cozinha</a
        >
        <a href="/admin/painel-admin.html" class="btn-acesso btn-admin"
          >⚙️ Administrador</a
        >
      </div>

      <div class="info-sistema">
        <p>Sistema de Pedidos em Tempo Real v1.0</p>
      </div>
    </div>
  </body>
</html>
