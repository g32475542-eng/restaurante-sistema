<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garçom - Sistema Restaurante</title>
    <link rel="stylesheet" href="/css/global.css">
    <style>
        .app-header {
            background: white;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-logo h1 {
            font-size: 1.5rem;
            color: var(--primary);
        }
        
        .header-user {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info {
            text-align: right;
        }
        
        .user-name {
            font-weight: 600;
            color: var(--dark);
        }
        
        .user-role {
            font-size: 0.875rem;
            color: var(--gray);
        }
        
        .app-container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }
        
        /* Painel de Mesas */
        .mesas-panel {
            background: white;
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }
        
        .mesas-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .mesas-header h2 {
            font-size: 1.25rem;
            color: var(--dark);
        }
        
        .mesas-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .mesa-card {
            background: #f5f5f5;
            border-radius: var(--radius-md);
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
        }
        
        .mesa-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }
        
        .mesa-card.selected {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }
        
        .mesa-card.ocupada {
            background: var(--warning);
            color: white;
        }
        
        .mesa-card.ocupada.selected {
            background: var(--primary);
        }
        
        .mesa-numero {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .mesa-status {
            font-size: 0.75rem;
            margin-top: 5px;
        }
        
        /* Área de Pedidos */
        .pedidos-panel {
            background: white;
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }
        
        .mesa-info {
            background: linear-gradient(135deg, var(--primary-light), white);
            padding: 20px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .mesa-info h3 {
            color: var(--primary-dark);
            font-size: 1.5rem;
        }
        
        .categorias {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        
        .categoria-btn {
            padding: 10px 20px;
            background: #f5f5f5;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .categoria-btn:hover {
            background: var(--primary-light);
        }
        
        .categoria-btn.ativo {
            background: var(--primary);
            color: white;
        }
        
        .cardapio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .item-card {
            background: #f9f9f9;
            border-radius: var(--radius-md);
            padding: 15px;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
        }
        
        .item-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
            background: white;
        }
        
        .item-card.indisponivel {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .item-nome {
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--dark);
        }
        
        .item-preco {
            color: var(--primary);
            font-weight: bold;
            font-size: 1.25rem;
        }
        
        .item-desc {
            font-size: 0.875rem;
            color: var(--gray);
            margin-top: 5px;
        }
        
        /* Carrinho */
        .carrinho {
            background: #f5f5f5;
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-top: 20px;
        }
        
        .carrinho-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .carrinho-header h3 {
            color: var(--dark);
        }
        
        .carrinho-itens {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        
        .carrinho-item {
            background: white;
            border-radius: var(--radius-md);
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideIn 0.3s ease;
        }
        
        .item-info {
            flex: 2;
        }
        
        .item-info strong {
            display: block;
            color: var(--dark);
        }
        
        .item-subtotal {
            font-size: 0.875rem;
            color: var(--gray);
        }
        
        .item-acoes {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .qtd-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            transition: var(--transition);
        }
        
        .qtd-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.1);
        }
        
        .qtd-btn.minus {
            background: var(--danger);
        }
        
        .qtd-btn.minus:hover {
            background: var(--danger-dark);
        }
        
        .item-qtd {
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }
        
        .carrinho-totais {
            background: white;
            border-radius: var(--radius-md);
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
        }
        
        .total-row.grande {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--primary);
            border-top: 2px solid #eee;
            margin-top: 5px;
            padding-top: 10px;
        }
        
        .observacao {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: var(--radius-md);
            margin-bottom: 15px;
            font-family: inherit;
            resize: vertical;
        }
        
        .observacao:focus {
            border-color: var(--primary);
            outline: none;
        }
        
        .btn-enviar {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-enviar:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .btn-enviar:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Pedidos Prontos */
        .prontos-panel {
            margin-top: 20px;
            background: #e8f5e9;
            border-radius: var(--radius-lg);
            padding: 15px;
        }
        
        .prontos-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .prontos-header h3 {
            color: var(--success);
        }
        
        .prontos-badge {
            background: var(--success);
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.875rem;
        }
        
        .prontos-lista {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
        }
        
        .pronto-card {
            background: white;
            border-radius: var(--radius-md);
            padding: 15px;
            border-left: 5px solid var(--success);
            box-shadow: var(--shadow-sm);
        }
        
        .pronto-card .mesa {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--success);
            margin-bottom: 5px;
        }
        
        .pronto-card .hora {
            font-size: 0.875rem;
            color: var(--gray);
        }
        
        @media (max-width: 768px) {
            .app-container {
                grid-template-columns: 1fr;
            }
            
            .mesas-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .cardapio-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 480px) {
            .mesas-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .cardapio-grid {
                grid-template-columns: 1fr;
            }
            
            .carrinho-item {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <div class="header-logo">
                <span style="font-size: 2rem;">👨‍🍳</span>
                <h1>Painel do Garçom</h1>
            </div>
            <div class="header-user">
                <div class="user-info">
                    <div class="user-name" id="usuario-nome">Carregando...</div>
                    <div class="user-role">Garçom</div>
                </div>
                <button class="btn btn-sm btn-outline" onclick="logout()">Sair</button>
            </div>
        </div>
    </header>
    
    <main class="app-container">
        <!-- Painel de Mesas -->
        <div class="mesas-panel">
            <div class="mesas-header">
                <h2>🪑 Mesas</h2>
                <span class="badge" id="mesas-count">0</span>
            </div>
            <div class="mesas-grid" id="mesas-grid">
                <!-- Mesas serão geradas aqui -->
            </div>
        </div>
        
        <!-- Área de Pedidos -->
        <div class="pedidos-panel">
            <div class="mesa-info" id="mesa-info">
                <h3 id="mesa-titulo">Selecione uma mesa</h3>
                <span id="mesa-status" class="badge"></span>
            </div>
            
            <!-- Categorias -->
            <div class="categorias" id="categorias">
                <!-- Categorias serão carregadas -->
            </div>
            
            <!-- Cardápio -->
            <div class="cardapio-grid" id="cardapio-grid">
                <!-- Itens serão carregados -->
            </div>
            
            <!-- Carrinho -->
            <div class="carrinho">
                <div class="carrinho-header">
                    <h3>🛒 Carrinho</h3>
                    <span id="carrinho-count" class="badge">0</span>
                </div>
                
                <div class="carrinho-itens" id="carrinho-itens">
                    <!-- Itens do carrinho -->
                </div>
                
                <div class="carrinho-totais">
                    <div class="total-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">R$ 0,00</span>
                    </div>
                    <div class="total-row grande">
                        <span>Total:</span>
                        <span id="total">R$ 0,00</span>
                    </div>
                </div>
                
                <textarea 
                    id="observacao" 
                    class="observacao" 
                    placeholder="Observações para cozinha (ex: ponto da carne, sem cebola...)"
                    rows="2"
                ></textarea>
                
                <button id="btn-enviar" class="btn-enviar" disabled>
                    Enviar Pedido para Cozinha
                </button>
            </div>
            
            <!-- Pedidos Prontos -->
            <div class="prontos-panel" id="prontos-panel" style="display: none;">
                <div class="prontos-header">
                    <h3>✅ Pedidos Prontos</h3>
                    <span class="prontos-badge" id="prontos-count">0</span>
                </div>
                <div class="prontos-lista" id="prontos-lista">
                    <!-- Pedidos prontos aparecerão aqui -->
                </div>
            </div>
        </div>
    </main>
    
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/garcom.js"></script>
</body>
</html>
