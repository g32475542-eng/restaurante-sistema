<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozinha - Sistema Restaurante</title>
    <link rel="stylesheet" href="/css/global.css">
    <style>
        .app-header {
            background: var(--secondary);
            color: white;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-logo h1 {
            font-size: 1.5rem;
            color: white;
        }
        
        .header-user {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info {
            text-align: right;
            color: white;
        }
        
        .user-name {
            font-weight: 600;
        }
        
        .user-role {
            font-size: 0.875rem;
            opacity: 0.9;
        }
        
        .status-bar {
            background: rgba(0,0,0,0.1);
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .status-item {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .app-container {
            max-width: 1600px;
            margin: 20px auto;
            padding: 0 20px;
        }
        
        .kanban-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            min-height: calc(100vh - 200px);
        }
        
        .kanban-coluna {
            background: #f5f5f5;
            border-radius: var(--radius-lg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: fit-content;
            max-height: calc(100vh - 200px);
        }
        
        .coluna-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid;
        }
        
        .coluna-header h2 {
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .coluna-badge {
            background: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .coluna.pendente .coluna-header {
            border-bottom-color: var(--danger);
        }
        .coluna.preparando .coluna-header {
            border-bottom-color: var(--warning);
        }
        .coluna.pronto .coluna-header {
            border-bottom-color: var(--success);
        }
        
        .pedidos-lista {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 200px;
        }
        
        .pedido-card {
            background: white;
            border-radius: var(--radius-md);
            padding: 15px;
            box-shadow: var(--shadow-sm);
            border-left: 5px solid;
            transition: var(--transition);
            animation: slideIn 0.3s ease;
        }
        
        .pedido-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        
        .pedido-card.pendente {
            border-left-color: var(--danger);
        }
        .pedido-card.preparando {
            border-left-color: var(--warning);
        }
        .pedido-card.pronto {
            border-left-color: var(--success);
        }
        
        .pedido-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .mesa-numero {
            font-size: 1.5rem;
            font-weight: bold;
            background: #f5f5f5;
            padding: 5px 15px;
            border-radius: 30px;
        }
        
        .tempo-pedido {
            font-size: 1rem;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 20px;
            background: #f5f5f5;
        }
        
        .tempo-pedido.atrasado {
            background: var(--danger);
            color: white;
        }
        
        .pedido-info {
            margin-bottom: 10px;
        }
        
        .garcom-nome {
            font-size: 0.875rem;
            color: var(--gray);
            margin-bottom: 5px;
        }
        
        .itens-pedido {
            background: #f9f9f9;
            border-radius: var(--radius-sm);
            padding: 10px;
            margin: 10px 0;
        }
        
        .item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 0.95rem;
        }
        
        .item:not(:last-child) {
            border-bottom: 1px dashed #ddd;
        }
        
        .observacao {
            background: #fff3cd;
            border-left: 3px solid var(--warning);
            padding: 8px;
            border-radius: var(--radius-sm);
            margin: 10px 0;
            font-style: italic;
            font-size: 0.9rem;
        }
        
        .acoes-pedido {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn-acao {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-iniciar {
            background: var(--warning);
            color: white;
        }
        .btn-iniciar:hover {
            background: var(--secondary-dark);
        }
        
        .btn-pronto {
            background: var(--success);
            color: white;
        }
        .btn-pronto:hover {
            background: var(--primary-dark);
        }
        
        .btn-entregue {
            background: var(--info);
            color: white;
        }
        
        .vazio-message {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
            background: white;
            border-radius: var(--radius-md);
            border: 2px dashed #ddd;
        }
        
        .tempo-real-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.875rem;
        }
        
        .pulse {
            width: 10px;
            height: 10px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @media (max-width: 1024px) {
            .kanban-board {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .kanban-coluna {
                max-height: 500px;
            }
        }
        
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            
            .header-user {
                width: 100%;
                justify-content: center;
            }
            
            .status-bar {
                justify-content: center;
            }
        }
        
        @media (max-width: 480px) {
            .pedido-header {
                flex-direction: column;
                gap: 10px;
            }
            
            .acoes-pedido {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <div class="header-logo">
                <span style="font-size: 2rem;">👩‍🍳</span>
                <h1>Painel da Cozinha</h1>
            </div>
            <div class="header-user">
                <div class="user-info">
                    <div class="user-name" id="usuario-nome">Carregando...</div>
                    <div class="user-role">Cozinha</div>
                </div>
                <button class="btn btn-sm" style="background: rgba(255,255,255,0.2); color: white;" onclick="logout()">
                    Sair
                </button>
            </div>
        </div>
        <div class="status-bar">
            <span class="status-item" id="hora-atual">🕐 00:00:00</span>
            <span class="status-item" id="pedidos-pendentes">⏳ Pendentes: 0</span>
            <span class="status-item" id="pedidos-preparando">🔨 Preparando: 0</span>
            <span class="status-item" id="pedidos-prontos">✅ Prontos: 0</span>
            <span class="status-item tempo-real-indicator">
                <span class="pulse"></span>
                Tempo Real
            </span>
        </div>
    </header>
    
    <main class="app-container">
        <div class="kanban-board">
            <!-- Coluna Pendentes -->
            <div class="kanban-coluna coluna pendente">
                <div class="coluna-header">
                    <h2>
                        <span>⏳</span>
                        Pendentes
                    </h2>
                    <span class="coluna-badge" id="pendentes-count">0</span>
                </div>
                <div class="pedidos-lista" id="pendentes-lista">
                    <!-- Pedidos pendentes aparecerão aqui -->
                </div>
            </div>
            
            <!-- Coluna Em Preparo -->
            <div class="kanban-coluna coluna preparando">
                <div class="coluna-header">
                    <h2>
                        <span>🔨</span>
                        Em Preparo
                    </h2>
                    <span class="coluna-badge" id="preparando-count">0</span>
                </div>
                <div class="pedidos-lista" id="preparando-lista">
                    <!-- Pedidos em preparo aparecerão aqui -->
                </div>
            </div>
            
            <!-- Coluna Prontos -->
            <div class="kanban-coluna coluna pronto">
                <div class="coluna-header">
                    <h2>
                        <span>✅</span>
                        Prontos
                    </h2>
                    <span class="coluna-badge" id="prontos-count">0</span>
                </div>
                <div class="pedidos-lista" id="prontos-lista">
                    <!-- Pedidos prontos aparecerão aqui -->
                </div>
            </div>
        </div>
    </main>
    
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/cozinha.js"></script>
</body>
</html>
