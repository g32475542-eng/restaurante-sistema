<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozinha - Sistema Restaurante</title>
<link rel="stylesheet" href="/css/cozinha.css">
</head>

<body>

<header class="topbar">
<h1>👨‍🍳 Tela da Cozinha</h1>

<div class="user-info">
<div class="user-avatar">👨‍🍳</div>

<div>
<div class="user-name" id="usuario-nome-header">Cozinha</div>
<div class="user-role">Chef</div>
</div>

</div>
</header>

<main class="container">

<section class="coluna">
<h2>🆕 Pedidos Pendentes</h2>
<div id="lista-pendentes"></div>
</section>

<section class="coluna">
<h2>🔥 Em Preparo</h2>
<div id="lista-preparo"></div>
</section>

<section class="coluna">
<h2>✅ Prontos</h2>
<div id="lista-prontos"></div>
</section>

</main>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const listaPendentes=document.getElementById("lista-pendentes");
const listaPreparo=document.getElementById("lista-preparo");
const listaProntos=document.getElementById("lista-prontos");

socket.emit("solicitar-pedidos");

socket.on("carregar-pedidos",(dados)=>{
dados.pendentes.forEach(p=>renderPendentes(p));
dados.preparando.forEach(p=>renderPreparo(p));
dados.prontos.forEach(p=>renderPronto(p));
});

socket.on("pedido-para-cozinha",(pedido)=>{
renderPendentes(pedido);
});

socket.on("pedido-em-preparo",(pedidoId)=>{
const el=document.getElementById("pedido-"+pedidoId);
if(!el)return;
listaPreparo.appendChild(el);
});

socket.on("pedido-para-entrega",(pedido)=>{
const el=document.getElementById("pedido-"+pedido.id);
if(!el)return;
listaProntos.appendChild(el);
});

function renderPendentes(p){
const div=document.createElement("div");
div.className="pedido";
div.id="pedido-"+p.id;

div.innerHTML=`
<h3>Mesa ${p.mesa}</h3>
<ul>${p.itens.map(i=>`<li>${i}</li>`).join("")}</ul>
<button onclick="iniciarPreparo('${p.id}')">Iniciar preparo</button>
`;

listaPendentes.appendChild(div);
}

function renderPreparo(p){
const div=document.createElement("div");
div.className="pedido";
div.id="pedido-"+p.id;

div.innerHTML=`
<h3>Mesa ${p.mesa}</h3>
<ul>${p.itens.map(i=>`<li>${i}</li>`).join("")}</ul>
<button onclick="finalizarPedido('${p.id}')">Pedido pronto</button>
`;

listaPreparo.appendChild(div);
}

function renderPronto(p){
const div=document.createElement("div");
div.className="pedido";
div.id="pedido-"+p.id;

div.innerHTML=`
<h3>Mesa ${p.mesa}</h3>
<ul>${p.itens.map(i=>`<li>${i}</li>`).join("")}</ul>
<span>Pronto para entrega</span>
`;

listaProntos.appendChild(div);
}

function iniciarPreparo(id){
socket.emit("iniciar-preparo",id);
}

function finalizarPedido(id){
socket.emit("pedido-pronto",id);
}

</script>

</body>
</html>
